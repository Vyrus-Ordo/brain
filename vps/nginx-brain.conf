# nginx config para brain.privo.app.br
# Adicione ao container infra-nginx e execute: docker exec infra-nginx nginx -s reload

server {
    listen 80;
    server_name brain.privo.app.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name brain.privo.app.br;

    ssl_certificate     /etc/letsencrypt/live/brain.privo.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brain.privo.app.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # Socket.io WebSocket (deve vir antes do location / )
    location /socket.io/ {
        proxy_pass         http://brain-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://brain-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
