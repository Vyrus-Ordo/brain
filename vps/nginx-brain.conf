# nginx config para brain.privo.app.br
# Adicione ao container infra-nginx e execute: docker exec infra-nginx nginx -s reload

server {
    listen 80;
    server_name brain.privo.app.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name brain.privo.app.br;

    ssl_certificate     /etc/letsencrypt/live/brain.privo.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brain.privo.app.br/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    resolver 127.0.0.11 valid=10s;

    set $frontend "frontend:80";

    # Socket.io WebSocket (deve vir antes do location / )
    location /socket.io/ {
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
