services:
  backend:
    build: ./backend-node
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - internal
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    networks:
      - internal
      - web
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  # Rede interna (frontend <-> backend)
  internal:
    driver: bridge

  # Rede compartilhada com infra-nginx, postgres e redis
  # Criada pelo /opt/infra/docker-compose.yml
  web:
    external: true
    name: infra-network
